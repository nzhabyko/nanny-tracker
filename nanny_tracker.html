<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Трекер смен</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1815;
    --muted: #8C8880;
    --green: #2D6A4F;
    --green-light: #D8EDDF;
    --red: #C1121F;
    --accent: #B5936B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 420px; margin: 0 auto; padding: 24px 16px 48px; }

  /* WELCOME SCREEN */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; text-align: center; }
  .welcome-title { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .welcome-sub { font-size: 14px; color: var(--muted); margin-bottom: 40px; }
  .name-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
  .name-btn {
    padding: 18px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .name-btn:hover { border-color: var(--accent); background: #FBF8F4; }
  .name-btn .name-sub { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 3px; }

  /* HEADER */
  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .header-name { font-size: 18px; font-weight: 500; color: var(--text); }
  .header-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .switch-btn { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; }
  .switch-btn:hover { color: var(--text); }

  /* CLOCK CARD */
  .clock-card { background: var(--surface); border-radius: 20px; padding: 28px 24px 24px; margin-bottom: 16px; border: 1px solid var(--border); text-align: center; }
  .status-dot { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .status-dot::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.active { color: var(--green); }
  .status-dot.active::before { background: var(--green); box-shadow: 0 0 0 3px rgba(45,106,79,0.15); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(45,106,79,0.15)}50%{box-shadow:0 0 0 6px rgba(45,106,79,0.07)} }
  .big-clock { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 400; letter-spacing: -2px; color: var(--text); line-height: 1; margin-bottom: 6px; }
  .shift-elapsed { font-size: 13px; color: var(--muted); min-height: 20px; margin-bottom: 24px; font-family: 'DM Mono', monospace; }
  .shift-elapsed.running { color: var(--green); }
  .main-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: transform 0.12s, opacity 0.12s; letter-spacing: 0.02em; }
  .main-btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-start { background: var(--text); color: #fff; }
  .btn-end { background: var(--red); color: #fff; }
  .manual-btn { width: 100%; padding: 11px; margin-top: 10px; background: none; border: 1px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .manual-btn:hover { background: var(--bg); color: var(--text); }
  .sync-status { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; min-height: 16px; font-family: 'DM Mono', monospace; }
  .sync-status.ok { color: var(--green); }
  .sync-status.err { color: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,24,21,0.55); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; border: 1px solid var(--border); }
  .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 20px; color: var(--text); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text); background: var(--bg); outline: none; -webkit-appearance: none; appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .modal-error { font-size: 12px; color: var(--red); margin-bottom: 14px; min-height: 16px; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-cancel { padding: 12px; background: none; border: 1px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; }
  .modal-save { padding: 12px; background: var(--text); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; }
  .modal-save:active { opacity: 0.8; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 14px 12px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }

  /* TABLE */
  .week-card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
  .week-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .week-nav { display: flex; align-items: center; gap: 10px; }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 8px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; color: var(--text); display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { background: var(--bg); }
  .week-name { font-size: 13px; color: var(--muted); font-weight: 400; }
  .week-total { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--green); background: var(--green-light); padding: 4px 10px; border-radius: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 8px 6px 8px 14px; text-align: left; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg); border-bottom: 1px solid var(--border); }
  td { padding: 10px 6px 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .td-day { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); }
  .td-hrs { font-weight: 500; }
  .td-name { font-family: 'DM Sans', sans-serif; font-size: 12px; }
  .name-katya { color: #2D6A4F; }
  .name-yulia { color: #B5936B; }
  .td-actions { padding-right: 10px; white-space: nowrap; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--border); font-size: 15px; padding: 2px 4px; transition: color 0.15s; }
  .icon-btn:hover { color: var(--accent); }
  .icon-btn.del:hover { color: var(--red); }
  .empty { padding: 28px; text-align: center; font-size: 13px; color: var(--muted); }

  /* FILTER */
  .filter-row { display: flex; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .export-btn { width: 100%; padding: 12px; background: none; border: 1px solid var(--border); border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .export-btn:hover { background: var(--surface); color: var(--text); }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="welcome" id="welcomeScreen">
  <div class="welcome-title">Привет!</div>
  <div class="welcome-sub">Кто ты?</div>
  <div class="name-btns">
    <button class="name-btn" onclick="selectName('Катя')">
      Катя
      <span class="name-sub">основная няня</span>
    </button>
    <button class="name-btn" onclick="selectName('Юля')">
      Юля
      <span class="name-sub">подменная няня</span>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div class="container" id="appScreen" style="display:none">
  <div class="header">
    <div class="header-left">
      <span class="header-title">Трекер смен</span>
      <span class="header-name" id="headerName"></span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <span class="header-date" id="headerDate"></span>
      <button class="switch-btn" onclick="switchUser()">сменить</button>
    </div>
  </div>

  <div class="clock-card">
    <div class="status-dot" id="statusDot">не активна</div>
    <div class="big-clock" id="bigClock">--:--</div>
    <div class="shift-elapsed" id="elapsed">&nbsp;</div>
    <button class="main-btn btn-start" id="mainBtn" onclick="toggleShift()">Начать смену</button>
    <button class="manual-btn" onclick="openModal(null)">+ добавить смену вручную</button>
    <div class="sync-status" id="syncStatus">&nbsp;</div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">неделя</div><div class="stat-val" id="sWeek">0ч</div></div>
    <div class="stat"><div class="stat-label">месяц</div><div class="stat-val" id="sMonth">0ч</div></div>
    <div class="stat"><div class="stat-label">смен</div><div class="stat-val" id="sCount">0</div></div>
  </div>

  <div class="week-card">
    <div class="week-head">
      <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
        <span class="week-name" id="weekName">эта неделя</span>
        <button class="nav-btn" onclick="changeWeek(1)">›</button>
      </div>
      <span class="week-total" id="weekTotal">0 ч</span>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" id="fAll" onclick="setFilter('all')">все</button>
      <button class="filter-btn" id="fKatya" onclick="setFilter('Катя')">Катя</button>
      <button class="filter-btn" id="fYulia" onclick="setFilter('Юля')">Юля</button>
    </div>
    <table>
      <thead><tr><th>день</th><th>начало</th><th>конец</th><th>ч</th><th>няня</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg">смен пока нет</div>
  </div>

  <button class="export-btn" onclick="exportCSV()">⬇ скачать CSV</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Добавить смену</div>
    <div class="field">
      <label>Няня</label>
      <select id="mName">
        <option value="Катя">Катя</option>
        <option value="Юля">Юля</option>
      </select>
    </div>
    <div class="field"><label>Дата</label><input type="date" id="mDate"></div>
    <div class="field"><label>Начало</label><input type="time" id="mStart"></div>
    <div class="field"><label>Конец</label><input type="time" id="mEnd"></div>
    <div class="modal-error" id="modalError"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Отмена</button>
      <button class="modal-save" onclick="saveModal()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbymbbDSPh7htVl3cFTHs2PU4h2icEDQp0Fu_7opQ-ZDJ1FwqR0R15G1s1b0nCwyjftyWg/exec';
const KEY = 'nanny_v3';
const KEY_ACTIVE = 'nanny_active_v3';
const KEY_NAME = 'nanny_name_v3';

let shifts = [], activeStart = null, weekOffset = 0, ticker = null, editingId = null;
let currentName = null, tableFilter = 'all';

function load() {
  try { shifts = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { shifts = []; }
  activeStart = localStorage.getItem(KEY_ACTIVE) || null;
  currentName = localStorage.getItem(KEY_NAME) || null;
}

function save() { localStorage.setItem(KEY, JSON.stringify(shifts)); }

function selectName(name) {
  currentName = name;
  localStorage.setItem(KEY_NAME, name);
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  render();
}

function switchUser() {
  if (!confirm('Сменить пользователя?')) return;
  currentName = null;
  localStorage.removeItem(KEY_NAME);
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('welcomeScreen').style.display = 'flex';
}

function fmt(ts) { return new Date(ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('ru-RU', {weekday:'short', day:'numeric', month:'short'}); }
function fmtH(ms) { const h = ms/3600000; return h < 0.01 ? '—' : h.toFixed(1)+'ч'; }
function toDateInput(ts) { const d=new Date(ts); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function toTimeInput(ts) { const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function weekBounds(offset) {
  const now=new Date(), d=now.getDay(), mon=new Date(now);
  mon.setDate(now.getDate()-(d===0?6:d-1)+offset*7); mon.setHours(0,0,0,0);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {s:mon.getTime(), e:sun.getTime()};
}

async function sendToSheets(shift) {
  const payload = {
    date: new Date(shift.start).toLocaleDateString('ru-RU'),
    start: fmt(shift.start), end: fmt(shift.end),
    hours: ((shift.end-shift.start)/3600000).toFixed(2),
    nanny: shift.name
  };
  try {
    await fetch(SHEET_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    showSync('✓ сохранено в таблицу', 'ok');
  } catch(e) { showSync('не удалось синхронизировать', 'err'); }
}

function showSync(msg, cls) {
  const el = document.getElementById('syncStatus');
  el.textContent=msg; el.className='sync-status '+cls;
  setTimeout(()=>{ el.textContent='\u00A0'; el.className='sync-status'; }, 4000);
}

function toggleShift() {
  if (!activeStart) {
    activeStart = Date.now().toString();
    localStorage.setItem(KEY_ACTIVE, activeStart);
    if (ticker) clearInterval(ticker);
    ticker = setInterval(updateElapsed, 15000);
  } else {
    const shift = { id: Date.now(), start: parseInt(activeStart), end: Date.now(), name: currentName };
    shifts.push(shift); save();
    activeStart = null; localStorage.removeItem(KEY_ACTIVE);
    clearInterval(ticker); ticker = null;
    sendToSheets(shift);
  }
  render();
}

function deleteShift(id) {
  if (!confirm('Удалить эту смену?')) return;
  shifts = shifts.filter(s => s.id !== id); save(); render();
}

function setFilter(f) {
  tableFilter = f;
  ['fAll','fKatya','fYulia'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(f==='all'?'fAll':f==='Катя'?'fKatya':'fYulia').classList.add('active');
  render();
}

function openModal(id) {
  editingId = id;
  document.getElementById('modalError').textContent = '';
  if (id !== null) {
    const s = shifts.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = 'Редактировать смену';
    document.getElementById('mName').value = s.name || currentName;
    document.getElementById('mDate').value = toDateInput(s.start);
    document.getElementById('mStart').value = toTimeInput(s.start);
    document.getElementById('mEnd').value = toTimeInput(s.end);
  } else {
    document.getElementById('modalTitle').textContent = 'Добавить смену';
    document.getElementById('mName').value = currentName;
    document.getElementById('mDate').value = toDateInput(Date.now());
    document.getElementById('mStart').value = '';
    document.getElementById('mEnd').value = '';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }

function saveModal() {
  const nameVal = document.getElementById('mName').value;
  const dateVal = document.getElementById('mDate').value;
  const startVal = document.getElementById('mStart').value;
  const endVal = document.getElementById('mEnd').value;
  const errEl = document.getElementById('modalError');
  if (!dateVal||!startVal||!endVal) { errEl.textContent='Заполни все поля'; return; }
  const startTs = new Date(dateVal+'T'+startVal).getTime();
  let endTs = new Date(dateVal+'T'+endVal).getTime();
  if (isNaN(startTs)||isNaN(endTs)) { errEl.textContent='Неверный формат'; return; }
  if (endTs <= startTs) endTs += 86400000;

  if (editingId !== null) {
    const idx = shifts.findIndex(x => x.id === editingId);
    if (idx !== -1) shifts[idx] = { id: editingId, start: startTs, end: endTs, name: nameVal };
  } else {
    const shift = { id: Date.now(), start: startTs, end: endTs, name: nameVal };
    shifts.push(shift); sendToSheets(shift);
  }
  save(); closeModal(); render();
}

function changeWeek(d) { weekOffset += d; render(); }

function updateElapsed() {
  if (!activeStart) return;
  const ms=Date.now()-parseInt(activeStart), h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  const el=document.getElementById('elapsed');
  el.textContent='начало '+fmt(parseInt(activeStart))+'  ·  '+(h>0?h+'ч ':'')+m+'мин';
  el.className='shift-elapsed running';
}

function render() {
  if (!currentName) return;

  const now = new Date();
  document.getElementById('bigClock').textContent = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('headerDate').textContent = now.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  document.getElementById('headerName').textContent = currentName;

  const active = !!activeStart;
  const dot=document.getElementById('statusDot'), btn=document.getElementById('mainBtn');
  if (active) {
    dot.textContent='смена идёт'; dot.className='status-dot active';
    btn.textContent='Завершить смену'; btn.className='main-btn btn-end';
    updateElapsed(); if (!ticker) ticker=setInterval(updateElapsed,15000);
  } else {
    dot.textContent='не активна'; dot.className='status-dot';
    btn.textContent='Начать смену'; btn.className='main-btn btn-start';
    const el=document.getElementById('elapsed'); el.textContent='\u00A0'; el.className='shift-elapsed';
  }

  const {s:ws,e:we}=weekBounds(weekOffset);
  let wShifts=shifts.filter(x=>x.start>=ws&&x.start<=we);
  if (tableFilter!=='all') wShifts=wShifts.filter(x=>x.name===tableFilter);
  wShifts.sort((a,b)=>b.start-a.start);
  const wMs=wShifts.reduce((s,x)=>s+(x.end-x.start),0);

  document.getElementById('weekTotal').textContent=(wMs/3600000).toFixed(1)+' ч';
  document.getElementById('weekName').textContent=weekOffset===0?'эта неделя':weekOffset===-1?'прошлая неделя':new Date(ws).toLocaleDateString('ru-RU',{day:'numeric',month:'short'});

  const tbody=document.getElementById('tbody'), empty=document.getElementById('emptyMsg');
  if (wShifts.length===0) { tbody.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display='none';
    tbody.innerHTML=wShifts.map(s=>{
      const nameClass=s.name==='Катя'?'name-katya':'name-yulia';
      return `<tr>
        <td class="td-day">${fmtDate(s.start)}</td>
        <td>${fmt(s.start)}</td><td>${fmt(s.end)}</td>
        <td class="td-hrs">${fmtH(s.end-s.start)}</td>
        <td class="td-name ${nameClass}">${s.name||'—'}</td>
        <td class="td-actions">
          <button class="icon-btn" onclick="openModal(${s.id})">✎</button>
          <button class="icon-btn del" onclick="deleteShift(${s.id})">×</button>
        </td></tr>`;
    }).join('');
  }

  // Stats — всегда по текущей няне
  const myShifts = shifts.filter(x=>x.name===currentName);
  const mStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  const {s:cws}=weekBounds(0);
  const mMs=myShifts.filter(x=>x.start>=mStart).reduce((s,x)=>s+(x.end-x.start),0);
  const cwMs=myShifts.filter(x=>x.start>=cws).reduce((s,x)=>s+(x.end-x.start),0);
  document.getElementById('sWeek').textContent=(cwMs/3600000).toFixed(1)+'ч';
  document.getElementById('sMonth').textContent=(mMs/3600000).toFixed(1)+'ч';
  document.getElementById('sCount').textContent=myShifts.length;
}

function exportCSV() {
  const rows=[['дата','начало','конец','часов','няня']];
  [...shifts].sort((a,b)=>a.start-b.start).forEach(s=>{
    rows.push([new Date(s.start).toLocaleDateString('ru-RU'),fmt(s.start),fmt(s.end),((s.end-s.start)/3600000).toFixed(2),s.name||'']);
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+rows.map(r=>r.join(';')).join('\n'));
  a.download='nanny_shifts.csv'; a.click();
}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
setInterval(()=>{ document.getElementById('bigClock').textContent=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); },30000);

load();
if (currentName) {
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  render();
}
</script>
</body>
